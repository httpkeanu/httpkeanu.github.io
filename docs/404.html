<html lang="en">

<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="favicon.ico" />
  <meta name="description" content="An app for learning about status codes!" />
  <meta name="og:description" content="An app for learning about status codes!" />
  <meta property="og:title" content="HTTP Keanu (nope)" />
  <meta property="og:image" content="https://www.keanu.codes/keanu.jpg" />

  <title>HTTP Keanu (nope)</title>

  <link rel="stylesheet" href="/style.css" />

</head>

<body>
  <div class="wrapper">
    <div class="content" role="main">
      <h1><a href="/">HTTP Keanu</a></h1>
      <p class="intro">
        A fun way to learn about status codes, inspired by
        <a href="https://http.cat">http.cat</a>!
      </p>
      <p class="random">
        🎲
        <a href="/random.html">Choose a random code</a>
      </p>
      <div class="codes">
            <div class="highlight selected" id="code0">

              <h2>0</h2>
              <h3>WELP</h3>
              <div class="imghold">
                <img src="/keanu.jpg" alt="Keanu holding his hands up">
              </div>

              <div class="extra">
                <p>Whoops! This one isn't on the list.</p>
                  <a href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/{{{code}}}">0 on MDN</a>
                
              </div>
            </div>
            </div>

      <p id="bonus">
        Bonus: try selecting an invalid code, like
        <a href="/1000.html">1000</a>
      </p>
    </div>
    <footer class="footer">
        <a
          class="btn--remix"
          target="_top"
          href="https://github.com/httpkeanu/httpkeanu.github.io/"
        >
          🚧
          Remix your own
        </a>
      </footer>
  </div>

</body>

</html>
