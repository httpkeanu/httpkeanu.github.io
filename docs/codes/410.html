  <body>
    <div class="wrapper">
      <div class="content" role="main">
        <h1><a href="/">HTTP Keanu</a></h1>
        <p class="intro">
          A fun way to learn about status codes, inspired by
          <a href="https://http.cat">http.cat</a>!
        </p>
        <p class="random">
          🎲
          <a href="/random.html">Choose a random code</a>
        </p>
        <div class="codes">
            <div class="highlight selected" id="code410">

              <h2>410</h2>
              <h3>Gone</h3>
              <div class="imghold">
                <img src="/ebb1de132c675e75.jpg" alt="A gravestone with Laurence Fishburne and Ian McShane" />
              </div>

              <div class="extra">
                <p>Sorry.</p>
                  <a
                    href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Status/410"
                  >410 on MDN</a>
              </div>
            </div>
        </div>
        <p id="bonus">
          Bonus: try selecting an invalid code, like
          <a href="/1000.html">1000</a>
        </p>
      </div>
      <footer class="footer">
        <a
          class="btn--remix"
          target="_top"
          href="https://github.com/httpkeanu/httpkeanu.github.io/"
        >
          🚧
          Remix your own
        </a>
      </footer>
    </div>

  </body>
